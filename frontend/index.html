<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>菜厨厨 — 智能冰箱菜谱推荐</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="app"></main>

  <!-- 底部导航 -->
  <nav id="bottomNav" class="bottom-nav">
    <div class="nav-inner">
      <button class="nav-btn" data-page="home">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>冰箱</span>
      </button>
      <button class="nav-btn" data-page="discover">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        <span>发现</span>
      </button>
      <button class="nav-btn" data-page="calendar">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg>
        <span>日历</span>
      </button>
      <button class="nav-btn" data-page="me">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>我的</span>
      </button>
    </div>
  </nav>

  <!-- 录入底部抽屉 -->
  <div id="inputSheet" class="input-sheet hidden">
    <div class="input-sheet-backdrop" onclick="closeInputSheet()"></div>
    <div class="input-sheet-panel">
      <div class="input-sheet-handle"></div>
      <h3 class="input-sheet-title">添加食材到冰箱</h3>
      <div class="input-methods">
        <button class="input-method-btn" onclick="showManualInput()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
          <span>手动选择</span>
        </button>
        <button class="input-method-btn" onclick="alert('语音输入功能开发中')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
          <span>语音输入</span>
        </button>
        <button class="input-method-btn" onclick="alert('拍照识别功能开发中')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
          <span>拍照识别</span>
        </button>
      </div>
      <div id="manualInputArea" class="manual-input-area hidden">
        <div class="quick-tags" id="quickTags"></div>
        <div class="manual-add-row">
          <input type="text" id="manualIngredientInput" placeholder="输入食材名称…" onkeydown="if(event.key==='Enter')addManualIngredient()" />
          <button class="btn-add-manual" onclick="addManualIngredient()">添加</button>
        </div>
      </div>
      <button class="btn-done" onclick="closeInputSheet()">完成</button>
    </div>
  </div>

  <!-- 烹饪模式全屏覆盖 -->
  <div id="cookingMode" class="cooking-mode hidden">
    <div class="cooking-header">
      <button class="cooking-close" onclick="exitCookingMode()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="cooking-progress" id="cookingProgress">1 / 5</div>
    </div>
    <div class="cooking-body" id="cookingBody" onclick="cookingNext()">
      <div class="cooking-step-num" id="cookingStepNum">第 1 步</div>
      <div class="cooking-step-text" id="cookingStepText"></div>
      <div class="cooking-tap-hint">点击屏幕进入下一步</div>
    </div>
    <div class="cooking-footer">
      <button class="cooking-nav-btn" onclick="event.stopPropagation();cookingPrev()">上一步</button>
      <button class="cooking-nav-btn cooking-nav-next" onclick="event.stopPropagation();cookingNext()">下一步</button>
    </div>
  </div>

  <!-- 修改过期时间弹窗 -->
  <div id="expiryEditModal" class="modal hidden">
    <div class="modal-backdrop" onclick="closeExpiryModal()"></div>
    <div class="modal-panel">
      <div class="modal-header">
        <h3 class="modal-title">修改过期时间</h3>
        <button class="modal-close" onclick="closeExpiryModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="expiry-edit-info" id="expiryEditInfo"></div>
        <div class="expiry-presets">
          <p class="expiry-preset-label">快速选择</p>
          <div class="expiry-preset-btns">
            <button class="expiry-preset-btn" onclick="setExpiryDays(1)">1天</button>
            <button class="expiry-preset-btn" onclick="setExpiryDays(3)">3天</button>
            <button class="expiry-preset-btn" onclick="setExpiryDays(7)">7天</button>
            <button class="expiry-preset-btn" onclick="setExpiryDays(14)">14天</button>
            <button class="expiry-preset-btn" onclick="setExpiryDays(30)">30天</button>
          </div>
        </div>
        <div class="expiry-custom">
          <p class="expiry-custom-label">自定义天数</p>
          <div class="expiry-custom-row">
            <input type="number" id="expiryDaysInput" min="1" max="365" value="7" />
            <span class="expiry-custom-unit">天</span>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn-cancel" onclick="closeExpiryModal()">取消</button>
        <button class="modal-btn-confirm" onclick="confirmExpiryChange()">确认修改</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
